openapi: 3.1.0
info:
  title: OpenWiFi User Portal
  description: API describing User Self Care interaction with OpenWifi.
  version: 1.0.0
  license:
    name: BSD3
    url: https://github.com/Telecominfraproject/wlan-cloud-ucentralgw/blob/master/LICENSE

servers:
  - url: 'https://localhost:16006/api/v1'

security:
  - bearerAuth: []
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    NotFound:
      $ref: https://raw.githubusercontent.com/routerarchitects/ra-wlan-cloud-ucentralsec/main/openpapi/owsec.yaml#/components/responses/NotFound
    Unauthorized:
      $ref: https://raw.githubusercontent.com/routerarchitects/ra-wlan-cloud-ucentralsec/main/openpapi/owsec.yaml#/components/responses/Unauthorized
    Success:
      $ref: https://raw.githubusercontent.com/routerarchitects/ra-wlan-cloud-ucentralsec/main/openpapi/owsec.yaml#/components/responses/Success
    BadRequest:
      $ref: https://raw.githubusercontent.com/routerarchitects/ra-wlan-cloud-ucentralsec/main/openpapi/owsec.yaml#/components/responses/BadRequest
    InternalError:
      description: The request failed because UserPortal encountered an internal error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: The request failed because the requested parental-control state conflicts with existing subscriber state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      description: Standard error payload returned by UserPortal handlers or forwarded from downstream services.
      additionalProperties: true
      required:
        - ErrorCode
        - ErrorDetails
        - ErrorDescription
      properties:
        ErrorCode:
          type: integer
          description: HTTP status code or service error code.
        ErrorDetails:
          type: string
          description: HTTP method or operation detail associated with the error.
        ErrorDescription:
          type: string
          description: Formatted service error description.


    SignupResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        created:
          type: integer
          format: int64
        modified:
          type: integer
          format: int64
        notes:
          type: array
          items:
            type: object
            properties:
              created:
                type: integer
                format: int64
              createdBy:
                type: string
              note:
                type: string
            additionalProperties: true
        tags:
          type: array
          items:
            type: integer
            format: int64
        email:
          type: string
          format: email
        userId:
          type: string
        macAddress:
          type: string
        serialNumber:
          type: string
        submitted:
          type: integer
          format: int64
        completed:
          type: integer
          format: int64
        status:
          type: string
        error:
          type: integer
          format: int64
        statusCode:
          type: integer
        deviceID:
          type: string
        registrationId:
          type: string
        operatorId:
          type: string
      additionalProperties: false

    ActionRequestBody:
      type: object
      properties:
        mac:
          type: string
          pattern: '^(?:[0-9A-Fa-f]{12}|(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})$'
        when:
          type: integer
          format: int64
          default: 0
        duration:
          type: integer
          format: int64
          default: 30
        pattern:
          type: string
          default: blink
        uri:
          type: string
        keepRedirector:
          type: boolean
          default: true
        ssid:
          $ref: '#/components/schemas/SsidOverride'
        client:
          type: array
          items:
            $ref: '#/components/schemas/ClientAccessChange'
      additionalProperties: true

    SsidOverride:
      type: object
      required:
        - name
        - password
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[A-Za-z0-9._ \-]{1,32}$'
        password:
          type: string
          minLength: 8
          maxLength: 32
          pattern: '^\S{8,32}$'
      additionalProperties: false

    ClientAccessChange:
      type: object
      required:
        - mac
        - access
      properties:
        mac:
          type: string
          pattern: '^(?:[0-9A-Fa-f]{12}|(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})$'
        access:
          type: string
          enum:
            - allow
            - deny
      additionalProperties: false

    ActionSuccessResponse:
      type: object
      properties:
        Operation:
          type: string
        Details:
          type: string
        Code:
          type: integer
      additionalProperties: true

    ActionGatewayResponse:
      type: object
      additionalProperties: true

    ActionResponse:
      oneOf:
        - $ref: '#/components/schemas/ActionSuccessResponse'
        - $ref: '#/components/schemas/ActionGatewayResponse'

    TopologyResponse:
      type: object
      minProperties: 1
      properties:
        boardId:
          type: string
        edges:
          $ref: '#/components/schemas/TopologyEdges'
        historicalClients:
          type: array
          items:
            $ref: '#/components/schemas/TopologyHistoricalClient'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/TopologyNode'
        timestamp:
          type: string
          format: date-time
      additionalProperties: true

    TopologyEmptyResponse:
      type: object
      maxProperties: 0
      additionalProperties: false

    TopologyEdges:
      type: object
      properties:
        mesh:
          type: array
          items:
            $ref: '#/components/schemas/TopologyEdge'
        wired:
          type: array
          items:
            $ref: '#/components/schemas/TopologyEdge'
      additionalProperties: true

    TopologyEdge:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        ssid:
          type: string
        band:
          type: string
        channel:
          type: integer
      additionalProperties: true

    TopologyHistoricalClient:
      type: object
      required:
        - station
        - blocked
      properties:
        blocked:
          type: string
          enum:
            - "0"
            - "1"
        station:
          type: string
      additionalProperties: true

    TopologyNode:
      type: object
      properties:
        aps:
          type: array
          items:
            $ref: '#/components/schemas/TopologyRadio'
        connected:
          type: boolean
        mesh:
          type: array
          items:
            $ref: '#/components/schemas/TopologyRadio'
        serial:
          type: string
        uptime:
          type: integer
      additionalProperties: true

    TopologyRadio:
      type: object
      properties:
        band:
          type: string
        bssid:
          type: string
        channel:
          type: integer
        clients:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/TopologyClient'
        mode:
          type: string
        ssid:
          type: string
        timestamp:
          type: string
          format: date-time
      additionalProperties: true

    TopologyClient:
      type: object
      properties:
        blocked:
          type: string
          enum:
            - "0"
            - "1"
        connected:
          type: integer
        fingerprint:
          type: string
        inactive:
          type: integer
        rssi:
          type: integer
        rx_rate_bitrate:
          type: integer
        rx_rate_chwidth:
          type: integer
        rx_speed:
          type: integer
        station:
          type: string
        tx_rate_bitrate:
          type: integer
        tx_speed:
          type: integer
      additionalProperties: true

    SystemConfigurationEntry:
      type: object
      required:
        - parameterName
        - parameterValue
      properties:
        parameterName:
          type: string
        parameterValue:
          type: string
      additionalProperties: false

    SystemConfigurationResponse:
      type: array
      items:
        $ref: '#/components/schemas/SystemConfigurationEntry'

    #########################################################################################
    ##
    ## These are endpoints that all services in the OPenWiFI stack must provide
    ##
    #########################################################################################

    CertificateInfo:
      type: object
      required:
        - filename
        - expiresOn
      properties:
        filename:
          type: string
        expiresOn:
          type: integer
          format: int64
      additionalProperties: true

    SystemCommandGetResponse:
      oneOf:
        - $ref: '#/components/schemas/SystemCommandInfoResponse'
        - $ref: '#/components/schemas/SystemCommandExtraConfigurationResponse'
        - $ref: '#/components/schemas/SystemCommandResourcesResponse'

    SystemCommandInfoResponse:
      type: object
      required:
        - version
        - uptime
        - start
        - os
        - processors
        - hostname
        - UI
        - certificates
      properties:
        version:
          type: string
        uptime:
          type: integer
          format: int64
        start:
          type: integer
          format: int64
        os:
          type: string
        processors:
          type: integer
        hostname:
          type: string
        UI:
          type: string
        certificates:
          type: array
          items:
            $ref: '#/components/schemas/CertificateInfo'
      additionalProperties: true

    SystemCommandExtraConfigurationResponse:
      type: object
      required:
        - additionalConfiguration
      properties:
        additionalConfiguration:
          type: boolean
      additionalProperties: true

    SystemCommandResourcesResponse:
      type: object
      required:
        - numberOfFileDescriptors
        - currRealMem
        - peakRealMem
        - currVirtMem
        - peakVirtMem
      properties:
        numberOfFileDescriptors:
          type: integer
        currRealMem:
          type: integer
          format: int64
        peakRealMem:
          type: integer
          format: int64
        currVirtMem:
          type: integer
          format: int64
        peakVirtMem:
          type: integer
          format: int64
      additionalProperties: true

    SystemCommandPostResponse:
      anyOf:
        - type: object
          required:
            - Code
            - Operation
            - Details
          properties:
            Code:
              type: integer
            Operation:
              type: string
            Details:
              type: string
          additionalProperties: true
        - $ref: '#/components/schemas/SystemTagListResponse'
        - $ref: '#/components/schemas/SystemListResponse'

    SystemCommandLogLevelRequestEntry:
      type: object
      properties:
        tag:
          type: string
        value:
          type: string
      additionalProperties: true

    SystemCommandSetLogLevelRequest:
      type: object
      required:
        - command
        - subsystems
      properties:
        command:
          type: string
          pattern: '^[sS][eE][tT][lL][oO][gG][lL][eE][vV][eE][lL]$'
          example: setloglevel
        subsystems:
          type: array
          items:
            $ref: '#/components/schemas/SystemCommandLogLevelRequestEntry'
      additionalProperties: true

    SystemCommandReloadRequest:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          pattern: '^[rR][eE][lL][oO][aA][dD]$'
          example: reload
        subsystems:
          type: array
          items:
            type: string
      additionalProperties: true

    SystemCommandGetLogLevelsRequest:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          pattern: '^[gG][eE][tT][lL][oO][gG][lL][eE][vV][eE][lL][sS]$'
          example: getloglevels
      additionalProperties: true

    SystemCommandGetLogLevelNamesRequest:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          pattern: '^[gG][eE][tT][lL][oO][gG][lL][eE][vV][eE][lL][nN][aA][mM][eE][sS]$'
          example: getloglevelnames
      additionalProperties: true

    SystemCommandGetSubsystemNamesRequest:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          pattern: '^[gG][eE][tT][sS][uU][bB][sS][yY][sS][tT][eE][mM][nN][aA][mM][eE][sS]$'
          example: getsubsystemnames
      additionalProperties: true

    SystemCommandRequest:
      oneOf:
        - $ref: '#/components/schemas/SystemCommandSetLogLevelRequest'
        - $ref: '#/components/schemas/SystemCommandReloadRequest'
        - $ref: '#/components/schemas/SystemCommandGetLogLevelsRequest'
        - $ref: '#/components/schemas/SystemCommandGetLogLevelNamesRequest'
        - $ref: '#/components/schemas/SystemCommandGetSubsystemNamesRequest'

    SystemTagValue:
      type: object
      properties:
        tag:
          type: string
        value:
          type: string
      additionalProperties: true

    SystemTagListResponse:
      type: object
      required:
        - tagList
      properties:
        tagList:
          type: array
          items:
            $ref: '#/components/schemas/SystemTagValue'
      additionalProperties: true

    SystemListResponse:
      type: object
      required:
        - list
      properties:
        list:
          type: array
          items:
            type: string
      additionalProperties: true

    Group:
      type: object
      description: Subscriber-scoped parental-control group proxied by UserPortal from the Mango Parental Control Service.
      required:
        - id
        - subscriber_id
        - group_config_index
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        subscriber_id:
          type: string
          format: uuid
        group_config_index:
          type: integer
        name:
          type: string
        description:
          oneOf:
            - type: string
            - type: 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    GroupCreateRequest:
      type: object
      description: Create request for one subscriber-scoped parental-control group.
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        description:
          oneOf:
            - type: string
            - type: 'null'
      additionalProperties: false

    GroupPutRequest:
      type: object
      description: Full replacement request for mutable group fields. PUT requests must send the complete mutable group representation.
      required:
        - name
        - description
      properties:
        name:
          type: string
          minLength: 1
        description:
          oneOf:
            - type: string
            - type: 'null'
      additionalProperties: false

    GroupDevice:
      type: object
      description: Subscriber-scoped client-MAC assignment to a parental-control group. Stored and returned client_mac uses colon-separated MAC representation.
      required:
        - subscriber_id
        - group_id
        - client_mac
        - created_at
        - updated_at
      properties:
        subscriber_id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        client_mac:
          type: string
          pattern: '^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$'
          description: Stored and returned MAC representation uses colon-separated form. UserPortal forwards canonical lowercase colon-separated MAC downstream. Rendered gateway config uses uppercase colon-separated MAC before ordering and rendering.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    GroupDeviceCreateRequest:
      type: object
      description: Create request for assigning one client MAC to one subscriber-scoped parental-control group.
      required:
        - client_mac
      properties:
        client_mac:
          type: string
          pattern: '^(?:[0-9A-Fa-f]{12}|(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})$'
          description: Accepted public input formats are 12 hex digits without separators, hyphen-separated MAC, or colon-separated MAC. UserPortal normalizes accepted input to canonical lowercase colon-separated MAC before downstream forwarding.
      additionalProperties: false

    ScheduleInternet:
      type: object
      description: Subscriber-scoped INTERNET schedule returned by UserPortal. target_value is always null.
      required:
        - id
        - subscriber_id
        - schedule_config_index
        - name
        - enabled
        - action_type
        - target_kind
        - target_value
        - start_time
        - stop_time
        - weekdays
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        subscriber_id:
          type: string
          format: uuid
        schedule_config_index:
          type: integer
        name:
          type: string
        description:
          oneOf:
            - type: string
            - type: 'null'
        enabled:
          type: boolean
        action_type:
          type: string
          enum:
            - BLOCK
        target_kind:
          type: string
          enum:
            - INTERNET
        target_value:
          type: 'null'
          description: Must be null when target_kind = INTERNET.
        start_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Start time in HH:MM 24-hour router local time. If start_time is later than stop_time, the schedule is an overnight window that continues past midnight into the next day.
        stop_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Stop time in HH:MM 24-hour router local time. An earlier stop_time is valid and means the schedule continues overnight past midnight.
        weekdays:
          type: array
          description: Distinct weekday numbers using 0 = Sunday, 1 = Monday, 2 = Tuesday, 3 = Wednesday, 4 = Thursday, 5 = Friday, and 6 = Saturday.
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    ScheduleApp:
      type: object
      description: Subscriber-scoped APP schedule returned by UserPortal. target_value is always a non-empty application identifier.
      required:
        - id
        - subscriber_id
        - schedule_config_index
        - name
        - enabled
        - action_type
        - target_kind
        - target_value
        - start_time
        - stop_time
        - weekdays
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        subscriber_id:
          type: string
          format: uuid
        schedule_config_index:
          type: integer
        name:
          type: string
        description:
          oneOf:
            - type: string
            - type: 'null'
        enabled:
          type: boolean
        action_type:
          type: string
          enum:
            - BLOCK
        target_kind:
          type: string
          enum:
            - APP
        target_value:
          type: string
          minLength: 1
          description: Required non-empty application identifier when target_kind = APP.
        start_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Start time in HH:MM 24-hour router local time. If start_time is later than stop_time, the schedule is an overnight window that continues past midnight into the next day.
        stop_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Stop time in HH:MM 24-hour router local time. An earlier stop_time is valid and means the schedule continues overnight past midnight.
        weekdays:
          type: array
          description: Distinct weekday numbers using 0 = Sunday, 1 = Monday, 2 = Tuesday, 3 = Wednesday, 4 = Thursday, 5 = Friday, and 6 = Saturday.
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    Schedule:
      description: Subscriber-scoped schedule returned by UserPortal. INTERNET schedules always return target_value = null. APP schedules always return a non-empty target_value.
      oneOf:
        - $ref: '#/components/schemas/ScheduleInternet'
        - $ref: '#/components/schemas/ScheduleApp'
      discriminator:
        propertyName: target_kind
        mapping:
          INTERNET: '#/components/schemas/ScheduleInternet'
          APP: '#/components/schemas/ScheduleApp'

    ScheduleCreateInternetRequest:
      type: object
      description: Create request for one subscriber-scoped INTERNET parental-control schedule.
      required:
        - name
        - action_type
        - target_kind
        - target_value
        - start_time
        - stop_time
        - weekdays
      properties:
        name:
          type: string
          minLength: 1
        description:
          oneOf:
            - type: string
            - type: 'null'
        enabled:
          type: boolean
          default: true
        action_type:
          type: string
          enum:
            - BLOCK
        target_kind:
          type: string
          enum:
            - INTERNET
        target_value:
          type: 'null'
          description: Must be null when target_kind = INTERNET.
        start_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Start time in HH:MM 24-hour router local time. If start_time is later than stop_time, the schedule is an overnight window that continues past midnight into the next day.
        stop_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Stop time in HH:MM 24-hour router local time. An earlier stop_time is valid and means the schedule continues overnight past midnight.
        weekdays:
          type: array
          description: Distinct weekday numbers using 0 = Sunday, 1 = Monday, 2 = Tuesday, 3 = Wednesday, 4 = Thursday, 5 = Friday, and 6 = Saturday.
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
      additionalProperties: false

    ScheduleCreateAppRequest:
      type: object
      description: Create request for one subscriber-scoped APP parental-control schedule.
      required:
        - name
        - action_type
        - target_kind
        - target_value
        - start_time
        - stop_time
        - weekdays
      properties:
        name:
          type: string
          minLength: 1
        description:
          oneOf:
            - type: string
            - type: 'null'
        enabled:
          type: boolean
          default: true
        action_type:
          type: string
          enum:
            - BLOCK
        target_kind:
          type: string
          enum:
            - APP
        target_value:
          type: string
          minLength: 1
          description: Required non-empty application identifier when target_kind = APP.
        start_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Start time in HH:MM 24-hour router local time. If start_time is later than stop_time, the schedule is an overnight window that continues past midnight into the next day.
        stop_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Stop time in HH:MM 24-hour router local time. An earlier stop_time is valid and means the schedule continues overnight past midnight.
        weekdays:
          type: array
          description: Distinct weekday numbers using 0 = Sunday, 1 = Monday, 2 = Tuesday, 3 = Wednesday, 4 = Thursday, 5 = Friday, and 6 = Saturday.
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
      additionalProperties: false

    ScheduleCreateRequest:
      description: Create request. INTERNET schedules must send target_value = null. APP schedules must send a non-empty target_value. start_time and stop_time use HH:MM 24-hour router local time. If start_time is later than stop_time, the schedule is an overnight window that continues past midnight into the next day. start_time and stop_time must not represent the same minute. weekdays values must be distinct and use 0 = Sunday through 6 = Saturday.
      oneOf:
        - $ref: '#/components/schemas/ScheduleCreateInternetRequest'
        - $ref: '#/components/schemas/ScheduleCreateAppRequest'
      discriminator:
        propertyName: target_kind
        mapping:
          INTERNET: '#/components/schemas/ScheduleCreateInternetRequest'
          APP: '#/components/schemas/ScheduleCreateAppRequest'

    SchedulePutInternetRequest:
      type: object
      description: Full replacement request for mutable INTERNET schedule fields. PUT requests must send the complete mutable schedule representation.
      required:
        - name
        - description
        - enabled
        - action_type
        - target_kind
        - target_value
        - start_time
        - stop_time
        - weekdays
      properties:
        name:
          type: string
          minLength: 1
        description:
          oneOf:
            - type: string
            - type: 'null'
        enabled:
          type: boolean
        action_type:
          type: string
          enum:
            - BLOCK
        target_kind:
          type: string
          enum:
            - INTERNET
        target_value:
          type: 'null'
          description: Must be null when target_kind = INTERNET.
        start_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Start time in HH:MM 24-hour router local time. If start_time is later than stop_time, the schedule is an overnight window that continues past midnight into the next day.
        stop_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Stop time in HH:MM 24-hour router local time. An earlier stop_time is valid and means the schedule continues overnight past midnight.
        weekdays:
          type: array
          description: Distinct weekday numbers using 0 = Sunday, 1 = Monday, 2 = Tuesday, 3 = Wednesday, 4 = Thursday, 5 = Friday, and 6 = Saturday.
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
      additionalProperties: false

    SchedulePutAppRequest:
      type: object
      description: Full replacement request for mutable APP schedule fields. PUT requests must send the complete mutable schedule representation.
      required:
        - name
        - description
        - enabled
        - action_type
        - target_kind
        - target_value
        - start_time
        - stop_time
        - weekdays
      properties:
        name:
          type: string
          minLength: 1
        description:
          oneOf:
            - type: string
            - type: 'null'
        enabled:
          type: boolean
        action_type:
          type: string
          enum:
            - BLOCK
        target_kind:
          type: string
          enum:
            - APP
        target_value:
          type: string
          minLength: 1
          description: Required non-empty application identifier when target_kind = APP.
        start_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Start time in HH:MM 24-hour router local time. If start_time is later than stop_time, the schedule is an overnight window that continues past midnight into the next day.
        stop_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Stop time in HH:MM 24-hour router local time. An earlier stop_time is valid and means the schedule continues overnight past midnight.
        weekdays:
          type: array
          description: Distinct weekday numbers using 0 = Sunday, 1 = Monday, 2 = Tuesday, 3 = Wednesday, 4 = Thursday, 5 = Friday, and 6 = Saturday.
          minItems: 1
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 6
      additionalProperties: false

    SchedulePutRequest:
      description: Full replacement request. PUT requests must send the complete mutable schedule representation. start_time and stop_time use HH:MM 24-hour router local time. If start_time is later than stop_time, the schedule is an overnight window that continues past midnight into the next day. start_time and stop_time must not represent the same minute. weekdays values must be distinct and use 0 = Sunday through 6 = Saturday.
      oneOf:
        - $ref: '#/components/schemas/SchedulePutInternetRequest'
        - $ref: '#/components/schemas/SchedulePutAppRequest'
      discriminator:
        propertyName: target_kind
        mapping:
          INTERNET: '#/components/schemas/SchedulePutInternetRequest'
          APP: '#/components/schemas/SchedulePutAppRequest'

    GroupScheduleLink:
      type: object
      description: Subscriber-scoped link between one parental-control group and one schedule.
      required:
        - subscriber_id
        - group_id
        - schedule_id
        - created_at
      properties:
        subscriber_id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        schedule_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    GroupScheduleLinkRequest:
      type: object
      description: Create request for linking one subscriber-scoped schedule to one subscriber-scoped parental-control group.
      required:
        - schedule_id
      properties:
        schedule_id:
          type: string
          format: uuid
      additionalProperties: false

    GroupScheduleReplaceRequest:
      type: object
      description: Full replacement request for the set of schedules linked to one subscriber-scoped parental-control group.
      required:
        - schedule_ids
      properties:
        schedule_ids:
          type: array
          uniqueItems: true
          items:
            type: string
            format: uuid
      additionalProperties: false

    GroupScheduleReplaceResponse:
      type: object
      description: Response containing the current subscriber-scoped group-schedule links after a full replacement operation.
      required:
        - links
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/GroupScheduleLink'
      additionalProperties: false

paths:
  /subscriber:
    post:
      tags:
        - Subscriber Information
      summary: Register a subscriber
      operationId: createSubscriber
      security: []
      parameters:
        - in: query
          name: email
          schema:
            type: string
            format: email
          required: true
        - in: query
          name: registrationId
          schema:
            type: string
            minLength: 1
          required: true
        - in: query
          name: resend
          schema:
            type: boolean
            default: false
          required: false
      responses:
        200:
          description: Signup request accepted or existing pending signup returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        400:
          $ref: '#/components/responses/BadRequest'
    delete:
      tags:
        - Subscriber Information
      summary: Remove the subscriber from the DB
      operationId: deleteSubscriberInfo
      security:
        - bearerAuth: []
      responses:
        200:
          $ref: '#/components/responses/Success'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'

  /subscriber/devices/{mac}:
    post:
      tags:
        - Subscriber Devices
      summary: Add a device to the subscriber account
      operationId: addSubscriberDevice
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: mac
          schema:
            type: string
            pattern: '^(?:[0-9A-Fa-f]{12}|(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})$'
          required: true
          example: aa:bb:cc:dd:ee:ff
      responses:
        200:
          $ref: '#/components/responses/Success'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Subscriber Devices
      summary: Remove a device from the subscriber account
      operationId: deleteSubscriberDevice
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: mac
          schema:
            type: string
            pattern: '^(?:[0-9A-Fa-f]{12}|(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})$'
          required: true
          example: aa:bb:cc:dd:ee:ff
      responses:
        200:
          $ref: '#/components/responses/Success'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalError'

  /action:
    post:
      tags:
        - Device Commands
      summary: Sending different commands to a device
      operationId: performAnAction
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: action
          required: true
          schema:
            type: string
            enum:
              - configure
              - reboot
              - blink
              - upgrade
              - factory
            default: configure
      requestBody:
        required: false
        content:
          application/json:
            examples:
              configure:
                value:
                  ssid:
                    name: Example-SSID
                    password: ExamplePassword1
                  client:
                    - mac: f0:09:0d:2d:b4:9c
                      access: allow
                    - mac: f0:09:0d:2d:b4:9c
                      access: deny
              blink:
                value:
                  mac: f0:09:0d:2d:b4:9c
                  when: 0
                  pattern: blink
            schema:
              $ref: '#/components/schemas/ActionRequestBody'

      responses:
        200:
          description: Action completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        403:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalError'

  /topology:
    get:
      tags:
        - Device Topology
      summary: Retrieve the network topology for the subscriber
      operationId: getTopology
      security:
        - bearerAuth: []
      responses:
        200:
          description: Topology graph
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TopologyResponse'
                  - $ref: '#/components/schemas/TopologyEmptyResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalError'

  /system:
    post:
      tags:
        - System Commands
      summary: Perform some system wide commands.
      operationId: systemCommand
      requestBody:
        required: true
        description: Command details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemCommandRequest'
      responses:
        200:
          description: Successful command execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemCommandPostResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        403:
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
        - System Commands
      summary: Retrieve different values from the running service.
      operationId: getSystemCommand
      parameters:
        - in: query
          description: Get a value
          name: command
          schema:
            type: string
            enum:
              - info
              - extraConfiguration
              - resources
          required: true
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemCommandGetResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        403:
          $ref: '#/components/responses/Unauthorized'

  /systemConfiguration:
    get:
      tags:
        - SystemConfiguration
      summary: Retrieve system configuration items
      operationId: getSystemConfiguration
      parameters:
