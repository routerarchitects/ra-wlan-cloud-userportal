openapi: 3.1.0
info:
  title: OpenWiFi User Portal
  description: API describing User Self Care interaction with OpenWifi.
  version: 1.0.0
  license:
    name: BSD3
    url: https://github.com/Telecominfraproject/wlan-cloud-ucentralgw/blob/master/LICENSE

servers:
  - url: 'https://localhost:16006/api/v1'

security:
  - bearerAuth: []
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    NotFound:
      $ref: https://raw.githubusercontent.com/routerarchitects/ra-wlan-cloud-ucentralsec/main/openpapi/owsec.yaml#/components/responses/NotFound
    Unauthorized:
      $ref: https://raw.githubusercontent.com/routerarchitects/ra-wlan-cloud-ucentralsec/main/openpapi/owsec.yaml#/components/responses/Unauthorized
    Success:
      $ref: https://raw.githubusercontent.com/routerarchitects/ra-wlan-cloud-ucentralsec/main/openpapi/owsec.yaml#/components/responses/Success
    BadRequest:
      $ref: https://raw.githubusercontent.com/routerarchitects/ra-wlan-cloud-ucentralsec/main/openpapi/owsec.yaml#/components/responses/BadRequest
    InternalError:
      description: The request failed because UserPortal encountered an internal error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: The request failed because the requested parental-control state conflicts with existing subscriber state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      description: Standard error payload returned by UserPortal handlers or forwarded from downstream services.
      additionalProperties: true
      required:
        - ErrorCode
        - ErrorDetails
        - ErrorDescription
      properties:
        ErrorCode:
          type: integer
          description: HTTP status code or service error code.
        ErrorDetails:
          type: string
          description: HTTP method or operation detail associated with the error.
        ErrorDescription:
          type: string
          description: Formatted service error description.


    SignupResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        created:
          type: integer
          format: int64
        modified:
          type: integer
          format: int64
        notes:
          type: array
          items:
            type: object
            properties:
              created:
                type: integer
                format: int64
              createdBy:
                type: string
              note:
                type: string
            additionalProperties: true
        tags:
          type: array
          items:
            type: integer
            format: int64
        email:
          type: string
          format: email
        userId:
          type: string
        macAddress:
          type: string
        serialNumber:
          type: string
        submitted:
          type: integer
          format: int64
        completed:
          type: integer
          format: int64
        status:
          type: string
        error:
          type: integer
          format: int64
        statusCode:
          type: integer
        deviceID:
          type: string
        registrationId:
          type: string
        operatorId:
          type: string
      additionalProperties: false

    ActionRequestBody:
      type: object
      properties:
        mac:
          type: string
          pattern: '^(?:[0-9A-Fa-f]{12}|(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})$'
        when:
          type: integer
          format: int64
          default: 0
        duration:
          type: integer
          format: int64
          default: 30
        pattern:
          type: string
          default: blink
        uri:
          type: string
        keepRedirector:
          type: boolean
          default: true
        ssid:
          $ref: '#/components/schemas/SsidOverride'
        client:
          type: array
          items:
            $ref: '#/components/schemas/ClientAccessChange'
      additionalProperties: true

    SsidOverride:
      type: object
      required:
        - name
        - password
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[A-Za-z0-9._ \-]{1,32}$'
        password:
          type: string
          minLength: 8
          maxLength: 32
          pattern: '^\S{8,32}$'
      additionalProperties: false

    ClientAccessChange:
      type: object
      required:
        - mac
        - access
      properties:
        mac:
          type: string
          pattern: '^(?:[0-9A-Fa-f]{12}|(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})$'
        access:
          type: string
          enum:
            - allow
            - deny
      additionalProperties: false

    ActionSuccessResponse:
      type: object
      properties:
        Operation:
          type: string
        Details:
          type: string
        Code:
          type: integer
      additionalProperties: true

    ActionGatewayResponse:
      type: object
      additionalProperties: true

    ActionResponse:
      oneOf:
        - $ref: '#/components/schemas/ActionSuccessResponse'
        - $ref: '#/components/schemas/ActionGatewayResponse'

    TopologyResponse:
      type: object
      minProperties: 1
      properties:
        boardId:
          type: string
        edges:
          $ref: '#/components/schemas/TopologyEdges'
        historicalClients:
          type: array
          items:
            $ref: '#/components/schemas/TopologyHistoricalClient'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/TopologyNode'
        timestamp:
          type: string
          format: date-time
      additionalProperties: true

    TopologyEmptyResponse:
      type: object
      maxProperties: 0
      additionalProperties: false

    TopologyEdges:
      type: object
      properties:
        mesh:
          type: array
          items:
            $ref: '#/components/schemas/TopologyEdge'
        wired:
          type: array
          items:
            $ref: '#/components/schemas/TopologyEdge'
      additionalProperties: true

    TopologyEdge:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        ssid:
          type: string
        band:
          type: string
        channel:
          type: integer
      additionalProperties: true

    TopologyHistoricalClient:
      type: object
      required:
        - station
        - blocked
      properties:
        blocked:
          type: string
          enum:
            - "0"
            - "1"
        station:
          type: string
      additionalProperties: true

    TopologyNode:
      type: object
      properties:
        aps:
          type: array
          items:
            $ref: '#/components/schemas/TopologyRadio'
        connected:
          type: boolean
        mesh:
          type: array
          items:
            $ref: '#/components/schemas/TopologyRadio'
        serial:
          type: string
        uptime:
          type: integer
      additionalProperties: true

    TopologyRadio:
      type: object
      properties:
        band:
          type: string
        bssid:
          type: string
        channel:
          type: integer
        clients:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/TopologyClient'
        mode:
          type: string
        ssid:
          type: string
        timestamp:
          type: string
          format: date-time
      additionalProperties: true

    TopologyClient:
      type: object
      properties:
        blocked:
          type: string
          enum:
            - "0"
            - "1"
        connected:
          type: integer
        fingerprint:
          type: string
        inactive:
          type: integer
        rssi:
          type: integer
        rx_rate_bitrate:
          type: integer
        rx_rate_chwidth:
          type: integer
        rx_speed:
          type: integer
        station:
          type: string
        tx_rate_bitrate:
          type: integer
        tx_speed:
          type: integer
      additionalProperties: true

    SystemConfigurationEntry:
      type: object
      required:
        - parameterName
        - parameterValue
      properties:
        parameterName:
          type: string
        parameterValue:
          type: string
      additionalProperties: false

    SystemConfigurationResponse:
      type: array
      items:
        $ref: '#/components/schemas/SystemConfigurationEntry'

    #########################################################################################
    ##
    ## These are endpoints that all services in the OPenWiFI stack must provide
    ##
    #########################################################################################

    CertificateInfo:
      type: object
      required:
        - filename
        - expiresOn
      properties:
        filename:
          type: string
        expiresOn:
          type: integer
          format: int64
      additionalProperties: true

    SystemCommandGetResponse:
      oneOf:
        - $ref: '#/components/schemas/SystemCommandInfoResponse'
        - $ref: '#/components/schemas/SystemCommandExtraConfigurationResponse'
        - $ref: '#/components/schemas/SystemCommandResourcesResponse'

    SystemCommandInfoResponse:
      type: object
      required:
        - version
        - uptime
        - start
        - os
        - processors
        - hostname
        - UI
        - certificates
      properties:
        version:
          type: string
        uptime:
          type: integer
          format: int64
        start:
          type: integer
          format: int64
        os:
          type: string
        processors:
          type: integer
        hostname:
          type: string
        UI:
          type: string
        certificates:
          type: array
          items:
            $ref: '#/components/schemas/CertificateInfo'
      additionalProperties: true

    SystemCommandExtraConfigurationResponse:
      type: object
      required:
        - additionalConfiguration
      properties:
        additionalConfiguration:
          type: boolean
      additionalProperties: true

    SystemCommandResourcesResponse:
      type: object
      required:
        - numberOfFileDescriptors
        - currRealMem
        - peakRealMem
        - currVirtMem
        - peakVirtMem
      properties:
        numberOfFileDescriptors:
          type: integer
        currRealMem:
          type: integer
          format: int64
        peakRealMem:
          type: integer
          format: int64
        currVirtMem:
          type: integer
          format: int64
        peakVirtMem:
          type: integer
          format: int64
      additionalProperties: true

    SystemCommandPostResponse:
      anyOf:
        - type: object
          required:
            - Code
            - Operation
            - Details
          properties:
            Code:
              type: integer
            Operation:
              type: string
            Details:
              type: string
          additionalProperties: true
        - $ref: '#/components/schemas/SystemTagListResponse'
        - $ref: '#/components/schemas/SystemListResponse'

    SystemCommandLogLevelRequestEntry:
      type: object
      properties:
        tag:
          type: string
        value:
          type: string
      additionalProperties: true

    SystemCommandSetLogLevelRequest:
      type: object
      required:
        - command
        - subsystems
      properties:
        command:
          type: string
          pattern: '^[sS][eE][tT][lL][oO][gG][lL][eE][vV][eE][lL]$'
          example: setloglevel
        subsystems:
          type: array
          items:
            $ref: '#/components/schemas/SystemCommandLogLevelRequestEntry'
      additionalProperties: true

    SystemCommandReloadRequest:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          pattern: '^[rR][eE][lL][oO][aA][dD]$'
          example: reload
        subsystems:
          type: array
          items:
            type: string
      additionalProperties: true

    SystemCommandGetLogLevelsRequest:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          pattern: '^[gG][eE][tT][lL][oO][gG][lL][eE][vV][eE][lL][sS]$'
          example: getloglevels
      additionalProperties: true

    SystemCommandGetLogLevelNamesRequest:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          pattern: '^[gG][eE][tT][lL][oO][gG][lL][eE][vV][eE][lL][nN][aA][mM][eE][sS]$'
          example: getloglevelnames
      additionalProperties: true

    SystemCommandGetSubsystemNamesRequest:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          pattern: '^[gG][eE][tT][sS][uU][bB][sS][yY][sS][tT][eE][mM][nN][aA][mM][eE][sS]$'
          example: getsubsystemnames
      additionalProperties: true

    SystemCommandRequest:
      oneOf:
        - $ref: '#/components/schemas/SystemCommandSetLogLevelRequest'
        - $ref: '#/components/schemas/SystemCommandReloadRequest'
        - $ref: '#/components/schemas/SystemCommandGetLogLevelsRequest'
        - $ref: '#/components/schemas/SystemCommandGetLogLevelNamesRequest'
        - $ref: '#/components/schemas/SystemCommandGetSubsystemNamesRequest'

    SystemTagValue:
      type: object
      properties:
        tag:
          type: string
        value:
          type: string
      additionalProperties: true

    SystemTagListResponse:
      type: object
      required:
        - tagList
      properties:
        tagList:
          type: array
          items:
            $ref: '#/components/schemas/SystemTagValue'
      additionalProperties: true

    SystemListResponse:
      type: object
      required:
        - list
      properties:
        list:
          type: array
          items:
            type: string
      additionalProperties: true

    Group:
      type: object
      description: Subscriber-scoped parental-control group proxied by UserPortal from the Mango Parental Control Service.
      required:
        - id
        - subscriber_id
        - group_config_index
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        subscriber_id:
          type: string
          format: uuid
        group_config_index:
          type: integer
        name:
          type: string
        description:
          oneOf:
            - type: string
            - type: 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    GroupCreateRequest:
      type: object
      description: Create request for one subscriber-scoped parental-control group.
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        description:
          oneOf:
            - type: string
            - type: 'null'
      additionalProperties: false

    GroupPutRequest:
      type: object
      description: Full replacement request for mutable group fields. PUT requests must send the complete mutable group representation.
      required:
        - name
        - description
      properties:
        name:
          type: string
          minLength: 1
        description:
          oneOf:
            - type: string
            - type: 'null'
      additionalProperties: false

paths:
  /subscriber:
    post:
      tags:
        - Subscriber Information
      summary: Register a subscriber
      operationId: createSubscriber
      security: []
      parameters:
        - in: query
          name: email
          schema:
            type: string
            format: email
          required: true
        - in: query
          name: registrationId
          schema:
            type: string
            minLength: 1
          required: true
        - in: query
          name: resend
          schema:
            type: boolean
            default: false
          required: false
      responses:
        200:
          description: Signup request accepted or existing pending signup returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        400:
          $ref: '#/components/responses/BadRequest'
    delete:
      tags:
        - Subscriber Information
      summary: Remove the subscriber from the DB
      operationId: deleteSubscriberInfo
      security:
        - bearerAuth: []
      responses:
        200:
          $ref: '#/components/responses/Success'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'

  /subscriber/devices/{mac}:
    post:
      tags:
        - Subscriber Devices
      summary: Add a device to the subscriber account
      operationId: addSubscriberDevice
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: mac
          schema:
            type: string
            pattern: '^(?:[0-9A-Fa-f]{12}|(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})$'
          required: true
          example: aa:bb:cc:dd:ee:ff
      responses:
        200:
          $ref: '#/components/responses/Success'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Subscriber Devices
      summary: Remove a device from the subscriber account
      operationId: deleteSubscriberDevice
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: mac
          schema:
            type: string
            pattern: '^(?:[0-9A-Fa-f]{12}|(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2})$'
          required: true
          example: aa:bb:cc:dd:ee:ff
      responses:
        200:
          $ref: '#/components/responses/Success'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalError'

  /action:
    post:
      tags:
        - Device Commands
      summary: Sending different commands to a device
      operationId: performAnAction
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: action
          required: true
          schema:
            type: string
            enum:
              - configure
              - reboot
              - blink
              - upgrade
              - factory
            default: configure
      requestBody:
        required: false
        content:
          application/json:
            examples:
              configure:
                value:
                  ssid:
                    name: Example-SSID
                    password: ExamplePassword1
                  client:
                    - mac: f0:09:0d:2d:b4:9c
                      access: allow
                    - mac: f0:09:0d:2d:b4:9c
                      access: deny
              blink:
                value:
                  mac: f0:09:0d:2d:b4:9c
                  when: 0
                  pattern: blink
            schema:
              $ref: '#/components/schemas/ActionRequestBody'

      responses:
        200:
          description: Action completed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        403:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalError'

  /topology:
    get:
      tags:
        - Device Topology
      summary: Retrieve the network topology for the subscriber
      operationId: getTopology
      security:
        - bearerAuth: []
      responses:
        200:
          description: Topology graph
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TopologyResponse'
                  - $ref: '#/components/schemas/TopologyEmptyResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
        500:
          $ref: '#/components/responses/InternalError'

  /system:
    post:
      tags:
        - System Commands
      summary: Perform some system wide commands.
      operationId: systemCommand
      requestBody:
        required: true
        description: Command details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemCommandRequest'
      responses:
        200:
          description: Successful command execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemCommandPostResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        403:
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
        - System Commands
      summary: Retrieve different values from the running service.
      operationId: getSystemCommand
      parameters:
        - in: query
          description: Get a value
          name: command
          schema:
            type: string
            enum:
              - info
              - extraConfiguration
              - resources
          required: true
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemCommandGetResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        403:
          $ref: '#/components/responses/Unauthorized'

  /systemConfiguration:
    get:
      tags:
        - SystemConfiguration
      summary: Retrieve system configuration items
      operationId: getSystemConfiguration
      parameters:
        - in: query
          description: Which parameters you want to retrieve
          name: entries
          schema:
            type: string
            minLength: 1
            example: element1,element2,element3
          required: true
      responses:
        200:
          description: List of configuration elements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemConfigurationResponse'
        400:
          $ref: '#/components/responses/BadRequest'
        403:
          $ref: '#/components/responses/Unauthorized'

    put:
      tags:
        - SystemConfiguration
      summary: Set some or all system configuration
      operationId: updateSystemConfiguration

      responses:
        400:
          $ref: '#/components/responses/BadRequest'
        403:
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags:
        - SystemConfiguration
      summary: Delete all additional system configuration
      operationId: deleteSystemConfiguration

      responses:
        400:
          $ref: '#/components/responses/BadRequest'
        403:
          $ref: '#/components/responses/Unauthorized'

  /groups:
    get:
      tags:
        - Groups
      summary: List subscriber parental-control groups
      description: Returns all parental-control groups for the authenticated subscriber.
      operationId: listGroups
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Subscriber parental-control groups returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - Groups
      summary: Create subscriber parental-control group
      description: Creates one parental-control group for the authenticated subscriber.
      operationId: createGroup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '200':
          description: Parental-control group created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /groups/{group_id}:
    get:
      tags:
        - Groups
      summary: Get one subscriber parental-control group
      description: Returns one parental-control group for the authenticated subscriber.
      operationId: getGroup
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: group_id
          required: true
          description: Parental-control group identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Parental-control group returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
        - Groups
      summary: Update one subscriber parental-control group
      description: Replaces the mutable fields of one parental-control group for the authenticated subscriber.
      operationId: updateGroup
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: group_id
          required: true
          description: Parental-control group identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupPutRequest'
      responses:
        '200':
          description: Parental-control group updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
